phase: 4
name: "Test Planning"
skillMdSection: "Phase 4 — Test Planning"

requiredRefs:
  - protocols/test-planning.md
  - methodology/TESTING_STRATEGY.md
  - templates/TEST_PLAN_TEMPLATE.md

emits:
  entry:
    - type: phase.started
      data: "{\"phase\":4}"
  exit:
    - type: phase.completed
      data: "{\"phase\":4}"

invokes:
  - kind: skill
    config: pipeline.skills.tdd
    fallback: inline
  - kind: protocol
    name: multi-agent-consensus
    input:
      task_type: plan
      agents_config: pipeline.agents.plan
      context: "Validate test plan covers Unit, Integration, Smoke, E2E with 90%+ branch coverage target."

produces:
  - kind: artifact
    path: "${sessionDir}/tdd-plan.md"
  - kind: artifact
    path: "docs/test-plans/${featureSlug}-test-plan.md"

gates:
  begin:
    - script: phase-gate.sh
      args: ["begin", "4"]
  end:
    - script: phase-gate.sh
      args: ["end", "4"]

budget:
  seconds: 120

userGate: none

instructions:
  entry:
    - "Read protocols/test-planning.md, methodology/TESTING_STRATEGY.md, templates/TEST_PLAN_TEMPLATE.md."
    - "Emit phase.started event."
    - "Run phase-gate.sh begin 4."
  main:
    - "Invoke config.pipeline.skills.tdd (default: superpowers:test-driven-development) to establish TDD discipline."
    - "Apply test-planning protocol using Phase 1-3 artifacts as inputs."
    - "Produce layered test plan: Layer 0 (data pipeline), Layer 1 (cross-validation), Layer 2 (per-feature by event type)."
    - "Coverage target: config.pipeline.testCoverageTarget (default 90% branch)."
    - "Map tests to acceptance criteria (traceability matrix)."
    - "Run multi-agent-consensus with agents.plan to validate the test plan."
    - "Write ${sessionDir}/tdd-plan.md AND docs/test-plans/${featureSlug}-test-plan.md."
  exit:
    - "Update progress-log.json phase 4 entry."
    - "Emit phase.completed event."
    - "Run phase-gate.sh end 4."
    - "Print banner: --- Phase 4 Complete: Test Planning ---"
