phase: 2
name: "Research (Codebase + Architecture)"
skillMdSection: "Phase 2 — Research (Codebase + Architecture)"

requiredRefs:
  - templates/ADR_TEMPLATE.md

emits:
  entry:
    - type: phase.started
      data: "{\"phase\":2}"
  exit:
    - type: phase.completed
      data: "{\"phase\":2}"

invokes:
  - kind: skill
    config: pipeline.skills.exploration
    fallback: inline
  - kind: skill
    config: pipeline.skills.architect
    fallback: inline
  - kind: protocol
    name: multi-agent-consensus
    input:
      task_type: plan
      agents_config: pipeline.agents.plan
      context: "Validate architecture design against requirements and existing codebase conventions."

produces:
  - kind: artifact
    path: "docs/adr/ADR-NNN-${architectureTitle}.md"
  - kind: freeze-doc-sections
    sections: [2, 3, 4, 7, 8]

gates:
  begin:
    - script: phase-gate.sh
      args: ["begin", "2"]
  end:
    - script: phase-gate.sh
      args: ["end", "2"]

budget:
  seconds: 120

userGate: none

instructions:
  entry:
    - "Read templates/ADR_TEMPLATE.md into working context."
    - "Emit phase.started event."
    - "Run phase-gate.sh begin 2."
  main:
    - "Invoke config.pipeline.skills.exploration (default: feature-dev:code-explorer): trace execution paths, map layers, identify conventions."
    - "Invoke config.pipeline.skills.architect (default: feature-dev:code-architect): design feature architecture from exploration findings."
    - "Run multi-agent-consensus with agents.plan, task_type=plan, context='Validate architecture design against requirements and existing conventions'."
    - "Produce ADR(s) at docs/adr/ADR-NNN-[title].md using ADR_TEMPLATE."
    - "Populate freeze doc §2 (API Contracts), §3 (3rd Party), §4 (Data & Database), §7 (Security/Auth), §8 (Performance)."
  exit:
    - "Update progress-log.json phase 2 entry."
    - "Emit phase.completed event."
    - "Run phase-gate.sh end 2."
    - "Print banner: --- Phase 2 Complete: Research ---"
